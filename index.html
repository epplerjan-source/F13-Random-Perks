<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F13 Random Perks & Counselor</title>

<style>
body{
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:30px;
}

#slot, #slot2{
    display:flex;
    justify-content:center;
    gap:30px;
    margin:50px 0;
}

.slot{
    width:180px;
    height:180px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(255,255,255,.25);
}

.slot img{
    width:100%;
    height:100%;
    object-fit:contain;
}

button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#2ecc71;
    color:white;
    margin-bottom:40px;
}

button:hover{
    background:#27ae60;
}

button:disabled{
    background:gray;
    cursor:not-allowed;
}
</style>

</head>
<body>

<h1>⭐ Random Perks ⭐ Star = Joker⭐</h1>

<div id="slot">
    <div class="slot"><img id="bild1"></div>
    <div class="slot"><img id="bild2"></div>
    <div class="slot"><img id="bild3"></div>
</div>

<h1>👤 Random Counselor 👤</h1>

<div id="slot2">
    <div class="slot"><img id="bild4"></div>
</div>

<button id="spin" onclick="drehenAlles()">Spin</button>

<script>

// ---------------- PERKS ----------------

function zufall(){
    return Math.floor(Math.random()*30)+1;
}

async function drehen(){

    const bilder=[
        document.getElementById("bild1"),
        document.getElementById("bild2"),
        document.getElementById("bild3")
    ];

    for(let i=0;i<25;i++){

        bilder.forEach(img=>{
            img.src="bilder/"+zufall()+".png";
        });

        await new Promise(r=>setTimeout(r,80));
    }

    let zahlen=[];

    while(zahlen.length<3){
        let z=zufall();
        if(!zahlen.includes(z)){
            zahlen.push(z);
        }
    }

    bilder[0].src="bilder/"+zahlen[0]+".png";
    await new Promise(r=>setTimeout(r,250));

    bilder[1].src="bilder/"+zahlen[1]+".png";
    await new Promise(r=>setTimeout(r,250));

    bilder[2].src="bilder/"+zahlen[2]+".png";
}

// ---------------- COUNSELOR ----------------

function zufall2(){
    return Math.floor(Math.random()*18)+1;
}

async function drehen2(){

    const bild=document.getElementById("bild4");

    for(let i=0;i<20;i++){
        bild.src="bilder2/"+zufall2()+".png";
        await new Promise(r=>setTimeout(r,80));
    }

    const z=zufall2();
    bild.src="bilder2/"+z+".png";
}

// ---------------- SPIN ----------------

async function spin(){

    const button=document.getElementById("spin");
    button.disabled=true;

    await Promise.all([
        drehen(),
        drehen2()
    ]);

    button.disabled=false;
}

// Alias für den Button
async function drehenAlles(){
    await spin();
}

// Start
spin();

</script>

</body>
</html>
